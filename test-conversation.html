<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Eco-skills · A Conversation With Yourself</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Outfit:wght@300;400;500;600&family=Noto+Serif+Devanagari:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#FAF4E9;--ink:#2A2014;--ink-soft:#6B5B4A;--ink-faint:#9A8770;
  --moss:#5f7d4d;--moss-deep:#3a5a2a;--moss-light:#7d9a6a;
  --gold:#b8943e;--gold-deep:#8B6914;--rust:#a8623e;--plum:#7a5a6a;
  --line:rgba(95,125,77,.18);--glass:rgba(250,244,233,.62);--glass2:rgba(250,244,233,.4);
  --radius:20px;--shadow:0 8px 40px rgba(42,32,20,.10),0 2px 8px rgba(42,32,20,.06);
  --fd:'Cormorant Garamond',Georgia,serif;--fb:'Outfit',system-ui,sans-serif;
  --fh:'Noto Serif Devanagari',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);font-size:16px;line-height:1.6;color:var(--ink);
  background:radial-gradient(1200px 700px at 80% -5%,rgba(184,148,62,.12),transparent 60%),
    radial-gradient(900px 600px at 0% 100%,rgba(95,125,77,.10),transparent 55%),var(--cream);
  min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px;-webkit-font-smoothing:antialiased}
body.hi .fd,body.hi .qtext{font-family:var(--fh)}
#app{max-width:640px;width:100%;margin:32px auto}
.card{position:relative;background:var(--glass);backdrop-filter:blur(20px) saturate(1.1);
  -webkit-backdrop-filter:blur(20px) saturate(1.1);border:1px solid rgba(255,255,255,.65);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(28px,5.5vw,48px);overflow:hidden}
.card::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(160deg,rgba(255,255,255,.18),transparent 40%);border-radius:var(--radius)}
.q-enter{animation:qIn .5s cubic-bezier(.22,1,.36,1)}
@keyframes qIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.q-exit{animation:qOut .28s ease forwards}@keyframes qOut{to{opacity:0;transform:translateY(-12px)}}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.logo{font-family:var(--fd);font-size:15px;color:var(--moss);font-weight:600;letter-spacing:.04em;display:flex;align-items:center;gap:7px}
.lang{display:flex;gap:2px;background:var(--glass2);border-radius:99px;padding:3px;border:1px solid var(--line)}
.lang button{border:none;background:transparent;font-family:var(--fb);font-size:12.5px;font-weight:600;
  color:var(--ink-soft);padding:5px 12px;border-radius:99px;cursor:pointer;transition:all .2s}
.lang button.on{background:var(--moss);color:#fff}

.dots{display:flex;gap:5px;margin-bottom:22px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:99px;background:rgba(95,125,77,.18);transition:all .4s}
.dot.done{background:var(--moss)}.dot.now{background:var(--gold);transform:scale(1.5);box-shadow:0 0 0 3px rgba(184,148,62,.18)}

.speaker{font-family:var(--fb);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:12px;opacity:.85}
.qtext{font-family:var(--fd);font-size:clamp(23px,4.8vw,31px);font-weight:600;line-height:1.32;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em}
.qsub{font-size:13.5px;color:var(--ink-soft);font-style:italic;margin-bottom:20px;line-height:1.5}
.qgap{height:16px}

.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.opt{display:flex;align-items:center;gap:13px;padding:15px 18px;border-radius:13px;border:1.5px solid var(--line);
  background:rgba(255,255,255,.45);cursor:pointer;transition:transform .16s,border-color .16s,background .16s;
  font-size:15.5px;color:var(--ink);text-align:left;line-height:1.4}
.opt:hover{border-color:var(--moss-light);background:rgba(95,125,77,.07);transform:translateX(4px)}
.opt.sel{border-color:var(--moss);background:rgba(95,125,77,.12)}
.optl{width:29px;height:29px;border-radius:8px;background:var(--glass2);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:700;font-size:14px;
  color:var(--moss);flex-shrink:0;transition:all .16s}
.opt.sel .optl{background:var(--moss);color:#fff;border-color:var(--moss)}

.cwrap{display:flex;align-items:center;gap:13px;padding:12px 18px;border-radius:13px;border:1.5px dashed var(--line);
  background:rgba(255,255,255,.28);transition:all .16s}
.cwrap.on{border-color:var(--moss);border-style:solid;background:rgba(95,125,77,.08)}
.cin{flex:1;border:none;background:transparent;font-family:var(--fb);font-size:15.5px;color:var(--ink);outline:none;padding:4px 0}
.cin::placeholder{color:var(--ink-faint)}
.tin{width:100%;padding:14px 18px;border-radius:13px;border:1.5px solid var(--line);background:rgba(255,255,255,.5);
  font-family:var(--fb);font-size:16px;color:var(--ink);outline:none;margin-bottom:14px;transition:border-color .16s}
.tin:focus{border-color:var(--moss)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 30px;border-radius:999px;
  font-family:var(--fb);font-size:14.5px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-p{background:var(--moss);color:#fff;box-shadow:0 4px 16px rgba(95,125,77,.25)}
.btn-p:hover{background:var(--moss-deep);transform:translateY(-2px)}
.btn-p:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-g{background:transparent;color:var(--moss);border:1.5px solid var(--moss)}
.btn-g:hover{background:rgba(95,125,77,.08)}

.intro{text-align:center}
.seed{font-size:50px;margin-bottom:6px;display:inline-block;animation:sway 4s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.intro h1{font-family:var(--fd);font-size:clamp(30px,6vw,42px);font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.08}
.intro .tag{font-family:var(--fd);font-style:italic;font-size:18px;color:var(--moss-deep);margin-bottom:20px}
.intro p{font-size:15px;color:var(--ink-soft);line-height:1.6;margin-bottom:20px;max-width:420px;margin-left:auto;margin-right:auto}
.meta{font-size:12.5px;color:var(--ink-faint);margin-top:16px}
body.hi .intro h1,body.hi .tag,body.hi .qtext,body.hi .arche,body.hi .it,body.hi .dn{font-family:var(--fh)}

.think{text-align:center;padding:28px 0}
.think .ring{width:50px;height:50px;border:3px solid rgba(95,125,77,.15);border-top-color:var(--moss);border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.think p{font-family:var(--fd);font-size:20px;font-style:italic;color:var(--moss-deep)}

.an{animation:qIn .6s ease}
.an .crown{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:10px}
.an h2{font-family:var(--fd);font-size:clamp(26px,5.2vw,36px);font-weight:700;color:var(--ink);margin-bottom:4px;line-height:1.12}
.an .arche{font-family:var(--fd);font-style:italic;font-size:20px;color:var(--moss-deep);margin-bottom:16px}
.an .lead{font-size:15.5px;color:var(--ink-soft);line-height:1.6;margin-bottom:24px}
.wound{background:linear-gradient(135deg,rgba(168,98,62,.12),rgba(184,148,62,.06));border:1px solid rgba(168,98,62,.22);
  border-radius:16px;padding:22px 24px;margin:18px 0}
.wound .wt{font-family:var(--fd);font-weight:700;font-size:21px;color:var(--rust);margin-bottom:10px}
.wound p{font-size:14.5px;line-height:1.62;color:var(--ink-soft);margin-bottom:9px}.wound p:last-child{margin-bottom:0}
.wound b{color:var(--ink);font-weight:600}
.sect{font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);margin:26px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.card-i{background:linear-gradient(135deg,rgba(95,125,77,.1),rgba(184,148,62,.05));border:1px solid rgba(95,125,77,.2);border-radius:14px;padding:18px 20px;margin:14px 0}
.card-i .it{font-family:var(--fd);font-weight:700;font-size:17px;color:var(--moss-deep);margin-bottom:7px}
.card-i p{font-size:14px;line-height:1.6;color:var(--ink-soft)}.card-i b{color:var(--ink)}
.rec{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}.rec:last-child{border:none}
.rec .ri{font-size:19px;flex-shrink:0}.rec .rt{font-size:14px;color:var(--ink-soft);line-height:1.55}.rec .rt b{color:var(--moss-deep)}
.cta{margin-top:30px;text-align:center;padding:24px;border-radius:14px;background:rgba(95,125,77,.08);border:1px solid var(--line)}
.cta p{font-family:var(--fd);font-size:18px;font-style:italic;color:var(--moss-deep);margin-bottom:14px}
body.hi .cta p{font-family:var(--fh)}

@media(max-width:500px){body{padding:10px}#app{margin:12px auto}.card{padding:24px 20px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
"use strict";

/* ============================================================
   BILINGUAL CONVERSATION ENGINE  (no API)
   - questions are NODES in a tree
   - each node's next is chosen by the answer -> feels continuous
   - {name} {hobby} {course} placeholders speak the user's words back
   - blocks of ~5 are internal only; user sees one smooth flow
   ============================================================ */

var L = "en"; // language

// tiny translation helper: t({en:"",hi:""})
function t(o){ return (typeof o==="string")?o:(o[L]||o.en); }

var S = fresh();
function fresh(){
  return { screen:"intro", lang:"en",
    name:"", age:"", gender:"", vars:{}, // vars holds hobby, course, job etc.
    node:null, history:[], traits:traitInit(), wounds:{}, sel:null, custom:"", customOn:false, qcount:0 };
}
function traitInit(){ return {body:50,calm:50,aware:50,focus:50,social:50,nature:50,regulate:50,resilience:50}; }
function clamp(v){return Math.max(0,Math.min(100,v));}
function age(){return parseInt(S.age)||25;}
function applyTr(tr){ if(!tr)return; for(var k in tr) S.traits[k]=clamp(S.traits[k]+tr[k]); }
function wound(key,amt){ S.wounds[key]=(S.wounds[key]||0)+(amt||1); }

// fill {name},{hobby} etc using saved vars
function fill(str){
  str = str.replace(/\{name\}/g, S.name||"friend");
  for(var k in S.vars){ str = str.replace(new RegExp("\\{"+k+"\\}","g"), S.vars[k]); }
  return str;
}

/* ============================================================
   THE TREE
   Each node:
   { id, speaker?, q:{en,hi}, sub?:{en,hi},
     opts:[ {t:{en,hi}, tr?:{}, w?:"woundKey", set?:{var:val|"@input"}, next:"nodeId"} ],
     custom?: {placeholder:{en,hi}, set:"varName", next:"nodeId"}  // free text
   }
   next can be a string, or a function(S)->id for smart routing.
   ============================================================ */
var T = {};

// ---------- OPENER: life situation (routes everything) ----------
T.start = {
  speaker:{en:"Nice to meet you",hi:"आपसे मिलकर अच्छा लगा"},
  q:{en:"Hey {name} — good to meet you. What fills most of your days right now?",
     hi:"नमस्ते {name} — आपसे मिलकर अच्छा लगा। इन दिनों आपका ज़्यादातर समय किसमें बीतता है?"},
  opts:[
    {t:{en:"I'm still studying — school or college",hi:"मैं अभी पढ़ाई कर रहा/रही हूँ — स्कूल या कॉलेज"}, next:"study_where"},
    {t:{en:"I'm working a job",hi:"मैं नौकरी करता/करती हूँ"}, next:"job_feel"},
    {t:{en:"I run my own work / business",hi:"मैं अपना काम / व्यवसाय करता/करती हूँ"}, next:"job_feel"},
    {t:{en:"I'm not working right now",hi:"मैं अभी कोई काम नहीं कर रहा/रही"}, next:"idle_why"},
  ],
  custom:{placeholder:{en:"Something else — tell me…",hi:"कुछ और — बताइए…"}, set:"life", next:"idle_why"}
};

// ===== STUDENT THREAD =====
T.study_where = {
  q:{en:"Nice. School, or college?",hi:"अच्छा। स्कूल, या कॉलेज?"},
  opts:[
    {t:{en:"School",hi:"स्कूल"}, set:{place:"school"}, next:"study_course"},
    {t:{en:"College / university",hi:"कॉलेज / विश्वविद्यालय"}, set:{place:"college"}, next:"study_course"},
    {t:{en:"Coaching / preparing for something",hi:"कोचिंग / किसी परीक्षा की तैयारी"}, set:{place:"prep"}, next:"study_course"},
  ]
};
T.study_course = {
  q:{en:"And what are you studying?",hi:"और आप क्या पढ़ रहे/रही हैं?"},
  sub:{en:"Type it however you'd say it.",hi:"जैसे आप कहते हैं वैसे ही लिखिए।"},
  custom:{placeholder:{en:"e.g. BA LLB, 11th science, NEET prep…",hi:"जैसे BA LLB, 11वीं विज्ञान, NEET की तैयारी…"}, set:"course", next:"study_love"},
  opts:[
    {t:{en:"I haven't really chosen — it chose me",hi:"मैंने सच में नहीं चुना — यह मुझे मिल गया"}, set:{course:"your studies"}, w:"forced", tr:{aware:-3,focus:-3}, next:"study_love"},
  ]
};
T.study_love = {
  q:{en:"Be honest with me — when you sit down to study {course}, does it actually feel good?",
     hi:"मुझसे सच कहिए — जब आप {course} पढ़ने बैठते/बैठती हैं, तो क्या वाकई अच्छा लगता है?"},
  opts:[
    {t:{en:"Yes — I genuinely enjoy it",hi:"हाँ — मुझे सचमुच अच्छा लगता है"}, tr:{focus:4,aware:3}, next:"hobby_ask"},
    {t:{en:"It's okay, nothing special",hi:"ठीक है, कुछ खास नहीं"}, tr:{focus:-1,aware:-1}, next:"study_why_meh"},
    {t:{en:"No — not really",hi:"नहीं — असल में नहीं"}, tr:{focus:-3,calm:-2}, next:"study_why_no"},
    {t:{en:"I dread it",hi:"मुझे इससे घबराहट होती है"}, tr:{focus:-4,calm:-4,regulate:-2}, w:"trapped", next:"study_why_no"},
  ]
};
T.study_why_no = {
  q:{en:"Okay. So what's really going on — is it the place itself, or was your heart somewhere else all along?",
     hi:"ठीक है। तो असल बात क्या है — क्या यह जगह ही है, या आपका मन हमेशा से कहीं और था?"},
  sub:{en:"There are no wrong answers here.",hi:"यहाँ कोई गलत उत्तर नहीं है।"},
  opts:[
    {t:{en:"Honestly… my parents pushed me into this",hi:"सच कहूँ तो… मेरे माता-पिता ने मुझे इसमें धकेला"}, w:"forced", tr:{aware:-4,focus:-3,regulate:-2}, next:"forced_dream"},
    {t:{en:"My interest was always in something else",hi:"मेरी रुचि हमेशा किसी और चीज़ में थी"}, w:"lost_self", tr:{aware:-2,focus:-3}, next:"forced_dream"},
    {t:{en:"The pressure and competition crush me",hi:"दबाव और प्रतियोगिता मुझे कुचल देती है"}, w:"pressure", tr:{calm:-4,resilience:-3}, next:"pressure_who"},
    {t:{en:"I just can't focus anymore",hi:"मैं अब ध्यान ही नहीं लगा पाता/पाती"}, w:"escape", tr:{focus:-4,calm:-3}, next:"escape_where"},
  ]
};
T.study_why_meh = {
  q:{en:"A lot of people live in that 'it's fine' zone. If money and marks didn't matter — would you still choose {course}?",
     hi:"बहुत से लोग इसी 'ठीक है' वाली स्थिति में जीते हैं। अगर पैसा और अंक मायने न रखते — तो क्या आप फिर भी {course} चुनते/चुनतीं?"},
  opts:[
    {t:{en:"Yes, I think I would",hi:"हाँ, शायद मैं चुनता/चुनती"}, tr:{aware:3,focus:2}, next:"hobby_ask"},
    {t:{en:"No… I'd do something completely different",hi:"नहीं… मैं कुछ बिल्कुल अलग करता/करती"}, w:"lost_self", tr:{aware:-3,focus:-3}, next:"forced_dream"},
    {t:{en:"I genuinely don't know",hi:"मुझे सच में नहीं पता"}, w:"lost_self", tr:{aware:-4,focus:-2}, next:"forced_dream"},
  ]
};
T.forced_dream = {
  q:{en:"So let me ask the real question — if it were entirely your choice, what would you actually be doing?",
     hi:"तो असली सवाल पूछता/पूछती हूँ — अगर पूरा फैसला आपका होता, तो आप असल में क्या कर रहे/रही होते?"},
  sub:{en:"Even if it sounds impractical. Say it.",hi:"भले ही यह व्यावहारिक न लगे। कहिए।"},
  custom:{placeholder:{en:"What you'd really choose…",hi:"जो आप सच में चुनते/चुनतीं…"}, set:"dream", next:"forced_gap"},
  opts:[
    {t:{en:"Honestly, I don't know anymore — that scares me",hi:"सच कहूँ तो अब नहीं पता — और यही मुझे डराता है"}, set:{dream:"something you can't name yet"}, w:"lost_self", tr:{aware:-4,resilience:-2}, next:"forced_gap"},
  ]
};
T.forced_gap = {
  q:{en:"There's a gap, then — between {dream} and the life you're actually living. How heavy does that gap feel?",
     hi:"तो एक खाई है — {dream} और जो ज़िंदगी आप जी रहे/रही हैं, उसके बीच। यह खाई कितनी भारी लगती है?"},
  opts:[
    {t:{en:"Very heavy — I think about it all the time",hi:"बहुत भारी — मैं हर समय इसके बारे में सोचता/सोचती हूँ"}, w:"trapped", tr:{calm:-4,regulate:-3,aware:2}, next:"hobby_ask"},
    {t:{en:"It's there, but I've learned to ignore it",hi:"है, पर मैंने इसे अनदेखा करना सीख लिया है"}, w:"lost_self", tr:{regulate:-2,aware:-2}, next:"hobby_ask"},
    {t:{en:"I keep hoping it'll sort itself out",hi:"मैं उम्मीद करता/करती रहता हूँ कि सब अपने आप ठीक हो जाएगा"}, w:"lost_self", tr:{focus:-3}, next:"hobby_ask"},
  ]
};

// ===== HOBBY THREAD (the fish-keeping branch) =====
T.hobby_ask = {
  q:{en:"Let's step away from all that. Outside of work and study — is there something that's just *yours*? A hobby, something you love?",
     hi:"चलिए इन सब से थोड़ा हटते हैं। काम और पढ़ाई से अलग — क्या कुछ ऐसा है जो सिर्फ़ *आपका* है? कोई शौक, कुछ जो आपको पसंद है?"},
  custom:{placeholder:{en:"e.g. fish keeping, sketching, cricket, cooking…",hi:"जैसे मछली पालना, चित्रकारी, क्रिकेट, खाना बनाना…"}, set:"hobby", next:"hobby_why"},
  opts:[
    {t:{en:"Honestly… I don't really have one anymore",hi:"सच कहूँ तो… अब कोई नहीं है"}, set:{hobby:"having a space of your own"}, w:"lost_self", tr:{nature:-3,aware:-3}, next:"hobby_none"},
  ]
};
T.hobby_why = {
  q:{en:"{hobby} — I like that. What is it you love about it? Is it that it quiets your mind… or is it more that it keeps you busy so you don't have to sit with your own thoughts?",
     hi:"{hobby} — अच्छा लगा। इसमें आपको क्या पसंद है? क्या यह आपके मन को शांत करता है… या फिर यह आपको व्यस्त रखता है ताकि आपको अपने ही विचारों के साथ न बैठना पड़े?"},
  sub:{en:"Be honest — both are okay.",hi:"सच कहिए — दोनों ठीक हैं।"},

function langbar(){
  return '<div class="lang"><button class="'+(L==="en"?"on":"")+'" onclick="setLang(\'en\')">EN</button>'+
    '<button class="'+(L==="hi"?"on":"")+'" onclick="setLang(\'hi\')">हिंदी</button></div>';
}
window.setLang=function(l){L=l;document.body.classList.toggle("hi",l==="hi");render();};

function intro(){
  app.innerHTML='<div class="card intro q-enter">'+
    '<div class="topbar"><div class="logo">🌿 '+t({en:"Eco-skills",hi:"ईको-स्किल्स"})+'</div>'+langbar()+'</div>'+
    '<span class="seed">🌱</span>'+
    '<h1 class="fd">'+t({en:"A Conversation<br/>With Yourself",hi:"स्वयं से<br/>एक बातचीत"})+'</h1>'+
    '<div class="tag">'+t({en:"not a quiz — a quiet, honest talk",hi:"कोई क्विज़ नहीं — एक शांत, सच्ची बात"})+'</div>'+
    '<p>'+t({en:"I'll ask you a few things, and each answer shapes what I ask next — like a real conversation. There are no scores to win. At the end, I'll tell you, gently and honestly, what I think you're really carrying.",hi:"मैं आपसे कुछ बातें पूछूँगा, और हर उत्तर तय करेगा कि मैं आगे क्या पूछूँ — एक असली बातचीत की तरह। यहाँ जीतने के लिए कोई अंक नहीं। अंत में, मैं नरमी और सच्चाई से बताऊँगा कि मेरे ख़याल से आप असल में क्या ढो रहे हैं।"})+'</p>'+
    '<button class="btn btn-p" onclick="begin()">'+t({en:"Let's talk →",hi:"चलिए बात करें →"})+'</button>'+
    '<div class="meta">'+t({en:"5–7 minutes · completely private · nothing leaves this page",hi:"5–7 मिनट · पूरी तरह निजी · कुछ भी इस पेज से बाहर नहीं जाता"})+'</div>'+
  '</div>';
}
window.begin=function(){S.screen="demo";S.demoStep=0;render();};

function demo(){
  var steps=[
    {f:"name",q:{en:"First — what should I call you?",hi:"पहले — मैं आपको क्या कहकर बुलाऊँ?"},type:"text",ph:{en:"Your name",hi:"आपका नाम"}},
    {f:"age",q:{en:"And how old are you, {name}?",hi:"और आपकी उम्र क्या है, {name}?"},type:"num",ph:{en:"Your age",hi:"आपकी उम्र"}},
    {f:"gender",q:{en:"How do you identify?",hi:"आप स्वयं को कैसे पहचानते हैं?"},type:"mcq",opts:[{en:"Male",hi:"पुरुष"},{en:"Female",hi:"महिला"},{en:"Other",hi:"अन्य"},{en:"Prefer not to say",hi:"नहीं बताना चाहूँगा/चाहूँगी"}]},
  ];
  var st=steps[S.demoStep];
  var inner='<div class="topbar"><div class="logo">🌿 '+t({en:"Eco-skills",hi:"ईको-स्किल्स"})+'</div>'+langbar()+'</div>'+
    '<div class="speaker">'+t({en:"Getting to know you",hi:"आपको जानना"})+'</div>'+
    '<div class="qtext">'+fill(t(st.q))+'</div>';
  if(st.type==="mcq"){
    inner+='<div class="opts">';
    st.opts.forEach(function(o,i){inner+='<div class="opt '+(S._d===i?"sel":"")+'" onclick="dSel('+i+')"><span class="optl">'+String.fromCharCode(65+i)+'</span>'+t(o)+'</div>';});
    inner+='</div><button class="btn btn-p" onclick="dNext()" '+(S._d!=null?"":"disabled")+'>'+t({en:"Continue →",hi:"आगे →"})+'</button>';
  }else{
    var v=S[st.f]||"";
    inner+='<input class="tin" type="'+(st.type==="num"?"number":"text")+'" placeholder="'+t(st.ph)+'" value="'+v+'" oninput="dIn(this.value)" onkeydown="if(event.key===\'Enter\')dNext()"/>'+
      '<button class="btn btn-p" onclick="dNext()" '+(v.toString().trim()?"":"disabled")+'>'+t({en:"Continue →",hi:"आगे →"})+'</button>';
  }
  app.innerHTML='<div class="card q-enter">'+inner+'</div>';
  var ip=app.querySelector('.tin');if(ip)setTimeout(function(){ip.focus();},80);
}
window.dIn=function(v){var f=["name","age","gender"][S.demoStep];S[f]=v;var b=app.querySelector('.btn-p');if(b)b.disabled=!v.toString().trim();};
window.dSel=function(i){S._d=i;render();};
window.dNext=function(){
  var f=["name","age","gender"][S.demoStep];
  if(f==="name"&&!S.name.trim())return;
  if(f==="age"){var a=parseInt(S.age);if(isNaN(a)||a<5||a>120)return;}
  if(f==="gender"){if(S._d==null)return;S.gender=["male","female","other","na"][S._d];}
  S.demoStep++;S._d=null;
  if(S.demoStep>=3){S.screen="q";S.node="start";S.sel=null;S.custom="";S.customOn=false;S.qcount=0;}
  render();
};

function question(){
  var n=T[S.node];
  if(!n){toThink();return;}
  S.qcount++;
  var dotsN=Math.min(S.qcount,14), dots="";
  for(var i=0;i<dotsN+2;i++){dots+='<span class="dot '+(i<S.qcount-1?"done":i===S.qcount-1?"now":"")+'"></span>';}
  var inner='<div class="topbar"><div class="logo">🌿 '+t({en:"Eco-skills",hi:"ईको-स्किल्स"})+'</div>'+langbar()+'</div>'+
    '<div class="dots">'+dots+'</div>';
  if(n.speaker)inner+='<div class="speaker">'+t(n.speaker)+'</div>';
  inner+='<div class="qtext">'+fill(t(n.q))+'</div>';
  if(n.sub)inner+='<div class="qsub">'+fill(t(n.sub))+'</div>';else inner+='<div class="qgap"></div>';
  inner+='<div class="opts">';
  (n.opts||[]).forEach(function(o,i){
    inner+='<div class="opt '+((!S.customOn&&S.sel===i)?"sel":"")+'" onclick="oSel('+i+')"><span class="optl">'+String.fromCharCode(65+i)+'</span>'+fill(t(o.t))+'</div>';
  });
  inner+='</div>';
  if(n.custom){
    inner+='<div class="cwrap '+(S.customOn?"on":"")+'" onclick="cOn()">'+
      '<span class="optl" style="'+(S.customOn?"background:var(--moss);color:#fff;border-color:var(--moss)":"")+'">✎</span>'+
      '<input class="cin" type="text" placeholder="'+t(n.custom.placeholder)+'" value="'+S.custom+'" oninput="cType(this.value)" onfocus="cOn()"/></div>';
  }
  var ok=S.sel!==null||(S.customOn&&S.custom.trim());
  inner+='<div style="margin-top:18px"><button class="btn btn-p" onclick="advance()" '+(ok?"":"disabled")+'>'+t({en:"Continue →",hi:"आगे →"})+'</button></div>';
  app.innerHTML='<div class="card q-enter">'+inner+'</div>';
}
window.oSel=function(i){S.sel=i;S.customOn=false;render();};
window.cOn=function(){if(!S.customOn){S.customOn=true;S.sel=null;render();setTimeout(function(){var e=app.querySelector('.cin');if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length);}},60);}};
window.cType=function(v){S.custom=v;S.customOn=true;S.sel=null;var b=app.querySelector('.btn-p');if(b)b.disabled=!v.trim();};
window.advance=function(){
  var n=T[S.node], nextId;
  if(S.customOn&&n.custom){
    if(n.custom.set)S.vars[n.custom.set]=S.custom.trim();
    S.traits.aware=clamp(S.traits.aware+2);
    nextId=n.custom.next;
  } else if(S.sel!==null){
    var o=n.opts[S.sel];
    if(o.set)for(var k in o.set)S.vars[k]=o.set[k];
    applyTr(o.tr); if(o.w)wound(o.w,2);
    nextId=o.next;
  }
  if(typeof nextId==="function")nextId=nextId(S);
  var card=app.querySelector('.card');if(card)card.classList.add('q-exit');
  setTimeout(function(){
    S.sel=null;S.custom="";S.customOn=false;
    if(!nextId||nextId==="__end"){toThink();}
    else{S.node=nextId;render();}
  },250);
};

function toThink(){S.screen="think";render();setTimeout(function(){S.screen="analysis";render();},2000);}
function think(){
  app.innerHTML='<div class="card q-enter"><div class="think"><div class="ring"></div>'+
    '<p>'+t({en:"Listening to everything you said…",hi:"आपने जो कहा, उस सब को सुन रहा हूँ…"})+'</p></div></div>';
}

function topWound(){
  var best=null,bv=-1;
  for(var k in S.wounds){if(S.wounds[k]>bv){bv=S.wounds[k];best=k;}}
  return best||"lost_self";
}

function analysis(){
  var name=cap(S.name||t({en:"friend",hi:"मित्र"}));
  var wk=topWound(), W=WOUNDS[wk]||WOUNDS.lost_self;
  var ecoKey=W.eco, eco=ECO[ecoKey];
  var limit=LIMIT[wk];
  // secondary wound
  var second=null,sv=-1;
  for(var k in S.wounds){if(k!==wk&&S.wounds[k]>sv){sv=S.wounds[k];second=k;}}

  var dims=Object.keys(S.traits).map(function(key){
    var nm={body:{en:"Body Awareness",hi:"शारीरिक जागरूकता"},calm:{en:"Inner Calm",hi:"भीतरी शांति"},
      aware:{en:"Self-Knowledge",hi:"आत्म-ज्ञान"},focus:{en:"Focus & Direction",hi:"ध्यान व दिशा"},
      social:{en:"Connection",hi:"जुड़ाव"},nature:{en:"Nature Bond",hi:"प्रकृति से नाता"},
      regulate:{en:"Emotional Steadiness",hi:"भावनात्मक स्थिरता"},resilience:{en:"Resilience",hi:"दृढ़ता"}};
    return {key:key,name:t(nm[key]),score:S.traits[key]};
  }).sort(function(a,b){return a.score-b.score;});

  function lab(s){return s>=72?t({en:"Strong",hi:"मज़बूत"}):s>=56?t({en:"Steady",hi:"स्थिर"}):s>=42?t({en:"Tender",hi:"कोमल"}):t({en:"Needs care",hi:"देखभाल चाहिए"});}
  function col(s){return s>=72?"#5f7d4d":s>=56?"#7d9a6a":s>=42?"#b8943e":"#a8623e";}

  var html='<div class="card an">'+
    '<div class="topbar"><div class="logo">🌿 '+t({en:"Eco-skills",hi:"ईको-स्किल्स"})+'</div>'+langbar()+'</div>'+
    '<div class="crown">'+t({en:"What I heard",hi:"मैंने जो सुना"})+'</div>'+
    '<h2 class="fd">'+t({en:"Here's what I think you're really carrying, ",hi:"मेरे ख़याल से आप असल में यह ढो रहे हैं, "})+name+'.</h2>'+
    '<div class="lead">'+t({en:"You answered honestly — so let me be honest back. Underneath the surface of what you told me, one thread ran deeper than the rest.",hi:"आपने सच्चाई से उत्तर दिए — तो मैं भी सच कहता हूँ। आपने जो बताया उसकी सतह के नीचे, एक धागा बाक़ियों से गहरा चला।"})+'</div>';

  // THE WOUND
  html+='<div class="wound"><div class="wt">'+t(W.title)+'</div><p>'+t(W.body)+'</p>';
  if(second&&WOUNDS[second]){html+='<p style="opacity:.9"><b>'+t({en:"And beneath that: ",hi:"और उसके नीचे: "})+'</b>'+t(WOUNDS[second].title).toLowerCase()+'</p>';}
  html+='</div>';

  // HOW ECO-SKILLS MEETS IT
  html+='<div class="sect">'+t({en:"How Eco-skills meets this",hi:"ईको-स्किल्स इसे कैसे संभालता है"})+'</div>';
  html+='<div class="card-i"><p>'+t(eco)+'</p></div>';

  // HONEST LIMIT
  if(limit){html+='<div class="card-i" style="background:linear-gradient(135deg,rgba(168,98,62,.1),rgba(184,148,62,.05));border-color:rgba(168,98,62,.2)"><div class="it" style="color:var(--rust)">'+t({en:"An honest word",hi:"एक सच्ची बात"})+'</div><p>'+t(limit)+'</p></div>';}

  // DIMENSIONS
  html+='<div class="sect">'+t({en:"The threads beneath your answers",hi:"आपके उत्तरों के नीचे के धागे"})+'</div>';
  dims.forEach(function(d){
    html+='<div style="margin-bottom:15px"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">'+
      '<span class="dn" style="font-family:var(--fd);font-size:17px;font-weight:600">'+d.name+'</span>'+
      '<span style="font-size:12px;font-weight:600;color:'+col(d.score)+'">'+lab(d.score)+'</span></div>'+
      '<div style="height:8px;background:rgba(42,32,20,.07);border-radius:99px;overflow:hidden"><div class="dfill" data-w="'+d.score+'" style="height:100%;width:0;border-radius:99px;background:'+col(d.score)+';transition:width 1.2s cubic-bezier(.22,1,.36,1)"></div></div></div>';
  });

  // CTA
  html+='<div class="cta"><p>'+t({en:"This was only the mirror. Eco-skills is how you change what it shows.",hi:"यह केवल आईना था। ईको-स्किल्स वह है जिससे आप इसका प्रतिबिंब बदलते हैं।"})+'</p>'+
    '<a class="btn btn-p" href="index.html#start">'+t({en:"Begin my free 7-day reset →",hi:"मेरा नि:शुल्क 7-दिन रीसेट शुरू करें →"})+'</a>'+
    '<div style="margin-top:12px"><button class="btn btn-g" onclick="again()">'+t({en:"Start over",hi:"फिर से शुरू करें"})+'</button></div></div>';

  html+='</div>';
  app.innerHTML=html;
  setTimeout(function(){document.querySelectorAll('.dfill').forEach(function(el){el.style.width=el.dataset.w+"%";});},120);
}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
window.again=function(){var l=L;S=fresh();L=l;render();};

render();
})();
</script>
</body>
</html>
